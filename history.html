<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#00355f"/>
<title>سجل الحضور | Attendance History</title>
<link rel="icon" href="assets/logo.png"/>
<link rel="manifest" href="manifest.json"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="assets/tailwind-config.js"></script>
<style>
  body { font-family: "Tajawal","Plus Jakarta Sans",sans-serif; min-height: max(884px,100dvh); }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .scrollbar-hide::-webkit-scrollbar { display: none; }
  .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
</style>
</head>
<body class="bg-background text-on-background min-h-screen pb-32">
<div id="toast" class="fixed top-4 inset-x-0 mx-auto max-w-sm z-[100] hidden px-4"></div>

<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-16 bg-white/80 backdrop-blur-xl border-b border-slate-200/50 shadow-[0_4px_20px_rgba(15,76,129,0.08)]">
  <div class="flex items-center gap-3">
    <div id="user-initials" class="w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center font-extrabold border border-primary-container">A</div>
    <div class="flex items-center gap-2">
      <img alt="Alyame" class="h-9 w-auto object-contain" src="assets/logo.png"/>
      <div class="flex flex-col leading-tight">
        <span class="text-[11px] font-extrabold text-primary whitespace-nowrap">شركة اليامي للسفر والسياحة</span>
        <span class="text-[9px] font-medium text-on-surface-variant whitespace-nowrap uppercase tracking-tight">Alyame Travel &amp; Tourism</span>
      </div>
    </div>
  </div>
  <div class="flex items-center gap-1">
    <button data-toggle-lang class="px-3 py-1.5 bg-surface-container rounded-full text-primary font-semibold text-xs flex items-center gap-1 active:scale-95">
      <span class="material-symbols-outlined text-[18px]">language</span>
      <span>AR/EN</span>
    </button>
    <button data-nav="dashboard.html" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-100 text-primary">
      <span class="material-symbols-outlined rtl:rotate-180">arrow_back</span>
    </button>
  </div>
</header>

<main class="pt-20 px-4 max-w-2xl mx-auto">
  <!-- Screen Header -->
  <div class="flex flex-col gap-1 mb-6">
    <h2 class="text-2xl font-extrabold text-primary">سجل الحضور / Attendance History</h2>
    <p class="text-sm text-on-surface-variant">مراجعة سجلات الحضور والمواقع الخاصة بك / Review your check-in logs and locations</p>
  </div>

  <!-- Filters -->
  <div class="flex gap-2 mb-6 overflow-x-auto pb-2 scrollbar-hide">
    <button data-filter="week" class="px-4 py-2 rounded-full font-semibold text-sm whitespace-nowrap bg-primary text-white">آخر ٧ أيام / Last 7 Days</button>
    <button data-filter="month" class="px-4 py-2 rounded-full font-semibold text-sm whitespace-nowrap bg-surface-container text-on-surface">هذا الشهر / This Month</button>
    <button data-filter="all" class="px-4 py-2 rounded-full font-semibold text-sm whitespace-nowrap bg-surface-container text-on-surface">الكل / All Time</button>
  </div>

  <!-- List -->
  <div id="history-list" class="flex flex-col gap-4"></div>

  <!-- Export -->
  <button id="btn-export" class="mt-6 w-full py-4 bg-surface-container-high text-primary font-semibold rounded-xl flex flex-col items-center justify-center gap-1 active:scale-95 transition hover:bg-surface-container-highest">
    <div class="flex items-center gap-2">
      <span class="material-symbols-outlined">download</span>
      <span>تصدير التقرير الشهري</span>
    </div>
    <span class="text-xs opacity-70">Export Monthly Report (CSV)</span>
  </button>

  <!-- Clear all -->
  <button data-clear class="mt-3 w-full py-3 text-error font-semibold rounded-xl flex items-center justify-center gap-2 hover:bg-error-container/30 transition text-sm">
    <span class="material-symbols-outlined text-[20px]">delete_forever</span>
    <span>مسح السجل / Clear History</span>
  </button>
</main>

<!-- BottomNav -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-white/70 backdrop-blur-2xl border-t border-slate-200/50 shadow-[0_-4px_20px_rgba(15,76,129,0.08)] rounded-t-2xl">
  <button data-nav="dashboard.html" class="flex flex-col items-center justify-center text-slate-400 active:scale-90 transition">
    <span class="material-symbols-outlined">dashboard</span>
    <span class="text-[10px] font-semibold leading-none text-center mt-0.5">الرئيسية<br/>Dashboard</span>
  </button>
  <button data-nav="history.html" class="flex flex-col items-center justify-center bg-blue-50 text-primary rounded-xl px-3 py-1 active:scale-90 transition">
    <span class="material-symbols-outlined">history</span>
    <span class="text-[10px] font-semibold leading-none text-center mt-0.5">السجل<br/>History</span>
  </button>
  <button data-logout class="flex flex-col items-center justify-center text-slate-400 active:scale-90 transition">
    <span class="material-symbols-outlined">person</span>
    <span class="text-[10px] font-semibold leading-none text-center mt-0.5">خروج<br/>Logout</span>
  </button>
</nav>

<script src="assets/app.js"></script>
<script>App.initHistory();</script>
</body>
</html>
