<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#00355f"/>
<title>نظام حضور اليامي | Alyame Attendance</title>
<link rel="icon" href="assets/logo.png"/>
<link rel="manifest" href="manifest.json"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="assets/tailwind-config.js"></script>
<style>
  body { font-family: "Tajawal","Plus Jakarta Sans",sans-serif; min-height: 100dvh; }
  .glass-panel { background: rgba(255,255,255,0.75); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); }
  .bg-hero { background-image: linear-gradient(rgba(0,53,95,0.3),rgba(0,53,95,0.6)), url('assets/hero.jpg'); background-size: cover; background-position: center; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; }
  @keyframes slideDown { from { opacity:0; transform:translateY(-20px);} to { opacity:1; transform:translateY(0);} }
</style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center p-4 md:p-8 relative overflow-hidden">
<div class="fixed inset-0 bg-hero -z-10"></div>
<div class="absolute top-20 right-10 w-40 h-40 md:w-60 md:h-60 bg-secondary/20 rounded-full blur-3xl"></div>
<div class="absolute bottom-20 left-10 w-56 h-56 md:w-80 md:h-80 bg-primary/30 rounded-full blur-3xl"></div>

<div class="absolute top-4 left-4 md:top-8 md:left-8 z-20">
  <div class="flex items-center bg-white/20 backdrop-blur-md border border-white/30 rounded-full p-1 shadow-lg">
    <button data-lang="ar" class="lang-btn px-4 py-1.5 rounded-full font-bold text-sm transition">AR</button>
    <button data-lang="en" class="lang-btn px-4 py-1.5 rounded-full font-bold text-sm transition">EN</button>
  </div>
</div>

<main class="w-full max-w-md md:max-w-lg relative z-10">
  <header class="mb-6 text-center">
    <div class="inline-flex items-center justify-center w-24 h-24 md:w-28 md:h-28 bg-white rounded-3xl shadow-2xl mb-4 p-2">
      <img alt="Alyame Travel" class="w-full h-full object-contain" src="assets/logo.png"/>
    </div>
    <h1 class="text-2xl md:text-3xl font-extrabold text-white tracking-tight" dir="ltr">Alyame Travel &amp; Tourism</h1>
    <p class="mt-2 text-sm text-white/80" data-i18n="login.subtitle">سجّل دخولك بالهاتف ورمز PIN</p>
  </header>

  <div class="glass-panel border border-white/30 rounded-3xl p-5 md:p-7 shadow-[0_20px_50px_rgba(0,53,95,0.15)]">
    <form id="login-form" class="space-y-4">
      <div>
        <label class="text-sm font-semibold text-on-surface-variant px-1 mb-1.5 flex justify-between">
          <span data-i18n="login.phone">رقم الهاتف</span>
          <span dir="ltr" class="opacity-60 text-xs">Phone</span>
        </label>
        <div class="flex" dir="ltr">
          <select id="f-cc" class="px-2 bg-surface-container-low border border-outline-variant border-e-0 rounded-s-xl h-14 text-sm font-semibold focus:outline-none">
            <option value="+218">🇱🇾 +218 ليبيا</option>
            <option value="+20">🇪🇬 +20 مصر</option>
            <option value="">—</option>
          </select>
          <input id="f-phone" type="text" required autocomplete="username" class="w-full h-14 px-4 bg-white border border-outline-variant rounded-e-xl focus:border-primary focus:ring-1 focus:ring-primary outline-none" placeholder="912345678 / admin"/>
        </div>
      </div>
      <div>
        <label class="text-sm font-semibold text-on-surface-variant px-1 mb-1.5 flex justify-between">
          <span data-i18n="login.pin">الرمز السري</span>
          <span dir="ltr" class="opacity-60 text-xs">PIN</span>
        </label>
        <input id="f-pin" type="password" inputmode="numeric" required autocomplete="current-password" class="w-full h-14 px-4 bg-white border border-outline-variant rounded-xl focus:border-primary focus:ring-1 focus:ring-primary outline-none tracking-widest text-lg" placeholder="••••"/>
      </div>
      <button id="f-submit" type="submit" class="w-full h-14 bg-primary text-white font-bold rounded-xl shadow-lg hover:bg-primary-container active:scale-[0.98] transition flex items-center justify-center gap-2 mt-2">
        <span><span data-i18n="login.continue">دخول</span> / Sign in</span>
        <span class="material-symbols-outlined rtl:rotate-180">arrow_forward</span>
      </button>
      <p class="text-[11px] text-center text-outline pt-2 leading-relaxed">
        أول مرة؟ استخدم: <code dir="ltr" class="bg-surface-container px-1.5 py-0.5 rounded font-mono text-primary">admin / 1234</code>
      </p>
    </form>
  </div>

  <div class="mt-5 flex items-center gap-3 p-3 md:p-4 bg-white/10 backdrop-blur-md rounded-2xl border border-white/10">
    <div class="w-11 h-11 rounded-xl bg-secondary-container flex items-center justify-center shrink-0">
      <span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">map</span>
    </div>
    <div class="flex-1 min-w-0">
      <h4 class="text-sm font-bold text-white truncate" data-i18n="login.ctx.title">جاهزية الجولات</h4>
      <p class="text-xs text-white/70 truncate" data-i18n="login.ctx.desc">تحقق تلقائي عبر GPS</p>
    </div>
  </div>

  <footer class="mt-6 text-center text-xs text-white/60" dir="ltr">
    © 2026 Alyame Travel &amp; Tourism · <span class="text-white font-semibold">Professional Journey</span>
  </footer>
</main>

<script src="assets/app.js?v=2026.04.25.9"></script>
<script>App.initLogin();</script>
</body>
</html>
